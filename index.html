<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#08131f">
  <title>MonticellOPS — Mission 001</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css?v=3">

  <script>
    (async function () {
      try {
        const cleanupKey = "monticellops_cleanup_v1";
        if (!sessionStorage.getItem(cleanupKey)) {
          sessionStorage.setItem(cleanupKey, "done");

          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(registration => registration.unregister()));
          }

          if ("caches" in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map(name => caches.delete(name)));
          }

          const url = new URL(window.location.href);
          url.searchParams.set("fresh", Date.now().toString());
          window.location.replace(url.toString());
          return;
        }
      } catch (error) {
        console.warn("Legacy cache cleanup could not complete:", error);
      }
    })();
  </script>

</head>
<body>
  <div class="app">
    <header class="masthead">
      <div class="brand">MONTICELLOPS</div>
      <div class="mission-id">MISSION 001 · FIELD RELEASE 3</div>
    </header>

    <main id="screen" class="card" aria-live="polite"></main>
  </div>

  <button class="reset-link fixed-reset" id="resetButton" type="button">
    Reset mission
  </button>

  <script src="mission-data.js?v=3"></script>
  <script src="app.js?v=3"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./service-worker.js?cleanup=3", { scope: "./" });
        } catch (error) {
          console.warn("Service-worker cleanup registration failed:", error);
        }
      });
    }
  </script>

</body>
</html>
